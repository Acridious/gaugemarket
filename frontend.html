<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaugeMarket — Live Feed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --white:#ffffff;--off:#f8f9fb;--ink:#0f1117;--ink2:#4a5162;--ink3:#9098a9;
  --border:#e4e7ef;--border2:#d0d5e0;
  --accent:#1a56db;--accent-light:#eff4ff;
  --green:#0e9f6e;--green-light:#f0fdf4;
  --amber:#c27803;--amber-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --red:#e02424;--red-light:#fef2f2;
  --slate:#64748b;--slate-light:#f1f5f9;
}
body{font-family:'Sora',sans-serif;background:var(--off);color:var(--ink);font-size:14px;line-height:1.6;min-height:100vh;}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:0 40px;height:52px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100;}
.logo{font-size:17px;font-weight:600;}
.logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:16px;}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pp 2s infinite;}
@keyframes pp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.refresh-btn{font-size:13px;padding:6px 14px;border:1px solid var(--border2);border-radius:6px;background:var(--white);color:var(--ink2);cursor:pointer;font-family:'Sora',sans-serif;}
.refresh-btn:hover{background:var(--off);}

/* SHELL */
.main{max-width:1100px;margin:0 auto;padding:28px 40px 80px;}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
.stat-val{font-size:26px;font-weight:600;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-1px;}
.stat-val.accent{color:var(--accent);}
.stat-label{font-size:11px;color:var(--ink3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}

/* TAB BAR */
.tab-bar{display:flex;align-items:center;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);}
.tab-btn{font-size:14px;font-weight:500;padding:10px 24px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-family:'Sora',sans-serif;position:relative;transition:color .15s;}
.tab-btn:hover{color:var(--ink2);}
.tab-btn.active{color:var(--accent);}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
.tab-count{display:inline-block;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--off);border:1px solid var(--border);border-radius:10px;padding:1px 7px;margin-left:6px;color:var(--ink3);}
.tab-btn.active .tab-count{background:var(--accent-light);border-color:transparent;color:var(--accent);}

/* SECTION FILTERS */
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.section-filters{display:flex;gap:5px;flex-wrap:wrap;}
.sf{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;color:var(--ink2);cursor:pointer;background:var(--white);font-family:'Sora',sans-serif;transition:all .15s;}
.sf:hover{background:var(--off);}
.sf.on{background:var(--accent);color:var(--white);border-color:var(--accent);font-weight:500;}

/* VIEWS */
.view{display:none;}
.view.active{display:block;}

/* SIGNAL CARDS (shared) */
.signal-stack{display:flex;flex-direction:column;gap:12px;}

/* Intelligence cards — full width, 2-col grid on wide screens */
.intel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:780px){.intel-grid{grid-template-columns:1fr;}}

.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card.no_news  {border-left:4px solid var(--purple);}
.card.confirmed{border-left:4px solid var(--green);}
.card.explained{border-left:4px solid var(--ink3);}
.card.reversal {border-left:4px solid var(--red);}
.card.uncertain{border-left:4px solid var(--amber);}
.card.terminal {border-left:4px solid var(--slate);opacity:.7;}

.card-top{display:flex;align-items:center;gap:8px;padding:11px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.card.no_news .card-top  {background:var(--purple-light);}
.card.confirmed .card-top{background:var(--green-light);}
.card.explained .card-top{background:var(--off);}
.card.reversal .card-top {background:var(--red-light);}
.card.uncertain .card-top{background:var(--amber-light);}
.card.terminal .card-top {background:var(--slate-light);}

.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.card.no_news .sdot  {background:var(--purple);animation:pp 1.5s infinite;}
.card.confirmed .sdot{background:var(--green);animation:pp 1.5s infinite;}
.card.explained .sdot{background:var(--ink3);}
.card.reversal .sdot {background:var(--red);animation:pp 1.5s infinite;}
.card.uncertain .sdot{background:var(--amber);animation:pp 1.5s infinite;}
.card.terminal .sdot {background:var(--slate);}

.slabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;flex:1;}
.card.no_news .slabel  {color:var(--purple);}
.card.confirmed .slabel{color:var(--green);}
.card.explained .slabel{color:var(--ink3);}
.card.reversal .slabel {color:var(--red);}
.card.uncertain .slabel{color:var(--amber);}
.card.terminal .slabel {color:var(--slate);}

.cat-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;background:var(--off);color:var(--ink3);border:1px solid var(--border);}
.score-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.score-extreme{background:#fef3c7;color:#92400e;}
.score-high   {background:#dbeafe;color:#1e40af;}
.score-medium {background:var(--off);color:var(--ink3);}
.stime{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}

.card-body{padding:16px 18px;}
.question{font-size:14px;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:12px;}
.question a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--border2);}
.question a:hover{color:var(--accent);}
.platform-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;margin-left:6px;vertical-align:middle;}
.poly{background:#dbeafe;color:#1e40af;}
.kal {background:#d1fae5;color:#065f46;}

.move-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.o-from{font-size:13px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.o-arr{color:var(--ink3);font-size:13px;}
.o-to{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.o-badge{font-size:12px;padding:2px 9px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:500;}
.move-up  {background:#ede9fe;color:#5b21b6;}
.move-down{background:#fef3c7;color:#92400e;}
.move-red {background:var(--red-light);color:var(--red);}
.o-track{flex:1;height:4px;background:var(--off);border-radius:3px;overflow:hidden;}
.o-fill{height:100%;border-radius:3px;}

.obs{padding:13px 18px;border-top:1px solid var(--border);background:var(--ink);}
.obs-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.obs-text{font-size:13px;color:rgba(255,255,255,.88);line-height:1.75;font-style:italic;}

.news-section{padding:12px 18px;border-top:1px solid var(--border);}
.ns-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.vacuum{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--purple-light);border:1px solid #ddd6fe;border-radius:7px;}
.vdot{width:6px;height:6px;background:var(--purple);border-radius:50%;margin-top:6px;flex-shrink:0;animation:pp 1.5s infinite;}
.vtext{font-size:12px;color:#5b21b6;line-height:1.65;}
.art{background:var(--off);border:1px solid var(--border);border-radius:7px;padding:11px 14px;}
.art-src{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:#dbeafe;color:#1e40af;font-family:'JetBrains Mono',monospace;display:inline-block;margin-bottom:6px;}
.art-hl{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5;}
.art-hl a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--border2);}

/* Related contracts */
.related-toggle{display:flex;align-items:center;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--ink3);cursor:pointer;user-select:none;}
.related-toggle:hover{color:var(--ink2);}
.chevron{transition:transform .2s;display:inline-block;font-size:10px;}
.related-toggle.open .chevron{transform:rotate(180deg);}
.related-list{display:none;flex-direction:column;gap:7px;margin-top:8px;}
.related-list.open{display:flex;}
.rel-item{background:var(--off);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.rel-q{font-size:12px;color:var(--ink2);flex:1;line-height:1.4;}
.rel-odds{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);}
.rel-type{font-size:11px;color:var(--ink3);font-style:italic;}

/* SPORTS CARDS — full width, 3-col grid */
.sports-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:900px){.sports-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.sports-grid{grid-template-columns:1fr;}}

.sport-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sport-card.terminal{opacity:.6;}
.sport-card.ctx-live-card    {border-left:4px solid var(--red);}
.sport-card.ctx-pregame-card {border-left:4px solid var(--accent);}
.sport-card.ctx-resolved-card{border-left:4px solid var(--slate);}

.sport-top{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
.sport-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.sport-ctx-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:auto;font-family:'JetBrains Mono',monospace;}
.tag-live    {background:var(--red-light);color:var(--red);}
.tag-resolved{background:var(--slate-light);color:var(--slate);}
.tag-pregame {background:var(--accent-light);color:var(--accent);}

.sport-body{padding:14px 14px 12px;}
.sport-q{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:12px;}
.sport-q a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--border2);}
.sport-q a:hover{color:var(--accent);}
.sport-move-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sp-from{font-size:12px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
.sp-arr{font-size:12px;color:var(--ink3);}
.sp-to{font-size:18px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.sp-to.up  {color:var(--green);}
.sp-to.down{color:var(--amber);}
.sp-badge{font-size:11px;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:500;}
.sp-score{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.sport-note{font-size:12px;color:var(--ink3);font-style:italic;}
.sport-obs{padding:10px 14px;border-top:1px solid var(--border);background:var(--ink);}
.sport-obs-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.sport-obs-text{font-size:12px;color:rgba(255,255,255,.85);line-height:1.65;font-style:italic;}

/* EMPTY / LOADING */
.empty{background:var(--white);border:1px dashed var(--border2);border-radius:12px;padding:48px;text-align:center;}
.empty strong{font-size:15px;font-weight:600;color:var(--ink);display:block;margin-bottom:6px;}
.empty p{font-size:13px;color:var(--ink3);}
.loading{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--ink3);font-size:13px;}
.error{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 18px;color:var(--red);font-size:13px;margin-bottom:16px;display:none;}

@media(max-width:700px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .main{padding:16px 16px 60px;}
  nav{padding:0 16px;}
  .tab-btn{padding:10px 14px;font-size:13px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Gauge<span>Market</span></div>
  <div class="nav-right">
    <div class="live-indicator"><div class="live-dot"></div><span id="live-label">Monitoring</span></div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</nav>

<div class="main">

  <div class="stats-bar">
    <div class="stat"><div class="stat-val accent" id="stat-volume">—</div><div class="stat-label">Capital in market</div></div>
    <div class="stat"><div class="stat-val" id="stat-markets">—</div><div class="stat-label">Markets watched</div></div>
    <div class="stat"><div class="stat-val" id="stat-today">—</div><div class="stat-label">Signals today</div></div>
    <div class="stat"><div class="stat-val accent" id="stat-high">—</div><div class="stat-label">High confidence</div></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('intelligence', this)">
      Intelligence <span class="tab-count" id="tab-count-intel">—</span>
    </button>
    <button class="tab-btn" onclick="switchTab('sports', this)">
      Sports <span class="tab-count" id="tab-count-sports">—</span>
    </button>
  </div>

  <div id="error-box" class="error"></div>

  <!-- INTELLIGENCE VIEW -->
  <div id="view-intelligence" class="view active">
    <div class="section-head">
      <div class="section-filters" id="intel-filters">
        <button class="sf on" onclick="setIntelFilter('all',this)">All</button>
        <button class="sf" onclick="setIntelFilter('geopolitical',this)">Geo</button>
        <button class="sf" onclick="setIntelFilter('macro',this)">Macro</button>
        <button class="sf" onclick="setIntelFilter('political',this)">Political</button>
        <button class="sf" onclick="setIntelFilter('crypto',this)">Crypto</button>
        <button class="sf" onclick="setIntelFilter('commodities',this)">Commodities</button>
      </div>
    </div>
    <div class="intel-grid" id="intel-feed"><div class="loading">Loading signals…</div></div>
  </div>

  <!-- SPORTS VIEW -->
  <div id="view-sports" class="view">
    <div class="section-head">
      <div class="section-filters" id="sports-filters">
        <button class="sf on" onclick="setSportsFilter('all',this)">All</button>
        <button class="sf" onclick="setSportsFilter('live',this)">Live</button>
        <button class="sf" onclick="setSportsFilter('pregame',this)">Pre-game</button>
        <button class="sf" onclick="setSportsFilter('resolved',this)">Resolved</button>
      </div>
    </div>
    <div class="sports-grid" id="sports-feed"><div class="loading">Loading…</div></div>
  </div>

</div>

<script>
const API = 'https://web-production-bde4.up.railway.app'
const INTEL_CATS  = new Set(['geopolitical','macro','political','crypto','commodities','other'])
const SPORTS_CATS = new Set(['sports','esports'])
let allSignals = [], intelFilter = 'all', sportsFilter = 'all'

// ── UTILS ─────────────────────────────────────────────────────────────────

function timeAgo(d) {
  const ts = d && !d.endsWith('Z') ? d+'Z' : d
  const s  = (Date.now() - new Date(ts)) / 1000
  if (s < 60)    return Math.floor(s)+'s ago'
  if (s < 3600)  return Math.floor(s/60)+'m ago'
  if (s < 86400) return Math.floor(s/3600)+'h ago'
  return Math.floor(s/86400)+'d ago'
}
function fmtVol(v) {
  if (!v)       return '$0'
  if (v >= 1e9) return '$'+(v/1e9).toFixed(1)+'B'
  if (v >= 1e6) return '$'+(v/1e6).toFixed(1)+'M'
  if (v >= 1e3) return '$'+(v/1e3).toFixed(0)+'K'
  return '$'+v.toFixed(0)
}
function pct(v) { return Math.round(v*100) }
async function fetchR(url, n=3) {
  for (let i=0; i<n; i++) {
    try { const r=await fetch(url); if(!r.ok) throw new Error(r.status); return await r.json() }
    catch(e) { if(i===n-1) throw e; await new Promise(r=>setTimeout(r,2000)) }
  }
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────

function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.getElementById('view-'+name).classList.add('active')
  btn.classList.add('active')
}

// ── INTELLIGENCE HELPERS ──────────────────────────────────────────────────

function cardClass(s) {
  if (s.state==='terminal') return 'terminal'
  if (s.is_reversal)        return 'reversal'
  return s.state || 'uncertain'
}

function stateLabel(s) {
  if (s.state==='terminal')  return 'Match concluded · Market resolved'
  if (s.is_reversal)         return 'Reversal · Contract moved opposite direction'
  if (s.category==='geopolitical' && s.state==='no_news')    return 'Geopolitical shift · No public news'
  if (s.category==='geopolitical' && s.state==='confirmed')  return 'Geopolitical signal · Capital moved before news'
  if ((s.category==='macro'||s.category==='political') && s.state==='no_news') return 'No news · High priority'
  if (s.state==='no_news')   return 'Inconsistent · No public news'
  if (s.state==='confirmed') return 'News broke after position · Capital moved first'
  if (s.state==='explained') return 'News already existed · May explain the move'
  if (s.state==='uncertain') return 'News found · Timing unclear'
  return 'Signal detected'
}

function moveColor(s) {
  if (s.state==='terminal') return 'var(--slate)'
  if (s.is_reversal)        return 'var(--red)'
  if (s.state==='no_news')  return 'var(--purple)'
  return s.direction==='YES' ? 'var(--green)' : 'var(--amber)'
}

function moveBadgeClass(s) {
  if (s.is_reversal)        return 'move-red'
  if (s.state==='no_news')  return 'move-up'
  return s.direction==='YES' ? 'move-up' : 'move-down'
}

function scoreClass(c) {
  if (c==='extreme') return 'score-extreme'
  if (c==='high')    return 'score-high'
  return 'score-medium'
}

function buildObservation(s) {
  const prev=pct(s.prev_odds), curr=pct(s.current_odds), move=pct(s.price_move)
  const rel=(s.related_same_event||0)+(s.related_cross_event||0)
  if (s.state==='terminal') {
    return `"${s.platform} contract settled at ${curr}% — market resolved ${curr>=98?'YES':'NO'}. This reflects match conclusion, not a live information signal."`
  }
  if (s.is_reversal) {
    const pd=s.reversal_from==='YES'?'up':'down', nd=s.direction==='YES'?'up':'down'
    return `"Contract previously moved ${pd} ${s.reversal_prev_move||move} points, now reversing ${nd} ${move} points. Sharp reversals can indicate informed positioning on both sides — or a correction of an earlier overreaction."`
  }
  if (s.category==='geopolitical'&&s.state==='no_news')
    return `"${move}pt shift on a geopolitical contract with no public news. Geo markets move slowly by nature — this speed is atypical and may reflect off-channel diplomatic or intelligence signals."`
  if (s.category==='macro'&&s.state==='no_news')
    return `"Macro contract moved ${prev}% → ${curr}%${rel>0?` across ${rel+1} related markets`:''} with no news. Unexplained macro moves are high-priority — they often precede central bank leaks or economic data."`
  if (s.state==='confirmed')
    return `"${s.platform} contract moved ${move} points before news confirmation. Capital appeared to price in the information early."`
  if (s.state==='no_news')
    return `"${s.platform} contract moved from ${prev}% to ${curr}% — a ${move} point shift${rel>0?` across ${rel+1} related contracts`:''} with no public news found."`
  if (s.state==='explained')
    return `"News pre-dates this move. The market may be catching up to existing public information."`
  return `"Signal detected. ${s.platform} contract moved ${move} points from ${prev}% to ${curr}%."`
}

function renderIntelCard(s) {
  const color = moveColor(s)
  const isUp  = s.direction==='YES'
  const move  = pct(s.price_move), curr=pct(s.current_odds), prev=pct(s.prev_odds)
  const sign  = isUp ? '+' : '−'
  const cc    = cardClass(s)
  const newsHtml = s.state==='terminal' ? '' :
    s.news_vacuum
      ? `<div class="news-section"><div class="ns-label">News check</div><div class="vacuum"><div class="vdot"></div><div class="vtext">No articles found matching this contract. Capital is leading the information record.</div></div></div>`
      : s.news_headline
        ? `<div class="news-section"><div class="ns-label">News check</div><div class="art"><span class="art-src">${s.news_source||'News'}</span><div class="art-hl"><a href="${s.news_url}" target="_blank" rel="noopener">${s.news_headline}</a></div></div></div>`
        : ''
  const related = Array.isArray(s.related_contracts) ? s.related_contracts : []
  const relHtml = related.length>0 ? `
    <div class="related-toggle" onclick="toggleRelated(this)">
      <span class="chevron">▾</span>&nbsp;${related.length} related contract${related.length>1?'s':''}
    </div>
    <div class="related-list">
      ${related.map(r=>`<div class="rel-item">
        <div class="rel-q">"${r.question}"</div>
        ${r.odds>0?`<div class="rel-odds">${Math.round(r.odds*100)}%</div>`:''}
        <div class="rel-type">${r.type==='causal'?'Causally linked':r.type==='cross_event'?'Related event':'Same event'}</div>
      </div>`).join('')}
    </div>` : ''
  return `<div class="card ${cc}">
    <div class="card-top">
      <div class="sdot"></div>
      <span class="slabel">${stateLabel(s)}</span>
      <span class="cat-badge">${s.category}</span>
      <span class="score-badge ${scoreClass(s.confidence)}">Score ${s.score}</span>
      <span class="stime">${timeAgo(s.detected_at)}</span>
    </div>
    <div class="card-body">
      <div class="question">
        ${s.market_url?`<a href="${s.market_url}" target="_blank" rel="noopener">"${s.question}"</a>`:`"${s.question}"`}
        <span class="platform-tag poly">${s.platform}</span>
      </div>
      <div class="move-row">
        <span class="o-from">${prev}%</span>
        <span class="o-arr">to</span>
        <span class="o-to" style="color:${color}">${curr}%</span>
        <span class="o-badge ${moveBadgeClass(s)}">${sign}${move}%</span>
        <div class="o-track"><div class="o-fill" style="width:${curr}%;background:${color}"></div></div>
      </div>
      ${relHtml}
    </div>
    ${newsHtml}
    <div class="obs">
      <div class="obs-label">${s.ai_summary ? 'What this means' : "Something's going on here"}</div>
      <div class="obs-text">${s.ai_summary || buildObservation(s)}</div>
    </div>
  </div>`
}

// ── SPORTS HELPERS ────────────────────────────────────────────────────────

function sportsCtxTag(ctx) {
  if (!ctx) return ''
  if (ctx==='match_resolved_yes'||ctx==='match_resolved_no') return '<span class="sport-ctx-tag tag-resolved">Resolved</span>'
  if (ctx==='large_ingame_move'||ctx==='moderate_ingame_move') return '<span class="sport-ctx-tag tag-live">Live</span>'
  return '<span class="sport-ctx-tag tag-pregame">Pre-game</span>'
}
function sportsCardClass(ctx) {
  if (!ctx) return ''
  if (ctx==='match_resolved_yes'||ctx==='match_resolved_no') return 'ctx-resolved-card'
  if (ctx==='large_ingame_move'||ctx==='moderate_ingame_move') return 'ctx-live-card'
  return 'ctx-pregame-card'
}
function sportsObservation(s) {
  const move=pct(s.price_move), curr=pct(s.current_odds), prev=pct(s.prev_odds)
  const ctx=s.sports_context
  if (s.ai_summary) return s.ai_summary
  if (ctx==='match_resolved_yes') return `Market settled at ${curr}% — YES won. Contract has resolved.`
  if (ctx==='match_resolved_no')  return `Market settled at ${curr}% — NO won. Contract has resolved.`
  if (ctx==='large_ingame_move')  return `${move}pt in-game move while the event is live. A score, red card, or injury likely explains this — check the live score to confirm.`
  if (ctx==='moderate_ingame_move') return `${move}pt shift during a live event. Moderate in-game moves are normal; verify against the live score.`
  if (ctx==='pre_game_move'&&s.state==='no_news') return `Pre-game contract moved ${prev}% → ${curr}% with no public news. May reflect lineup leaks, injury information, or sharp money ahead of the match.`
  return `${s.platform} contract moved ${move} points from ${prev}% to ${curr}%.`
}

function renderSportsCard(s) {
  const isUp=s.direction==='YES', curr=pct(s.current_odds), prev=pct(s.prev_odds), move=pct(s.price_move)
  const sign=isUp?'+':'−', ctx=s.sports_context||''
  const obs=sportsObservation(s)
  return `<div class="sport-card ${s.is_terminal?'terminal':''} ${sportsCardClass(ctx)}">
    <div class="sport-top">
      <span class="sport-cat">${s.category}</span>
      <span class="stime" style="margin-left:auto;margin-right:4px">${timeAgo(s.detected_at)}</span>
      ${sportsCtxTag(ctx)}
    </div>
    <div class="sport-body">
      <div class="sport-q">
        ${s.market_url?`<a href="${s.market_url}" target="_blank" rel="noopener">"${s.question}"</a>`:`"${s.question}"`}
      </div>
      <div class="sport-move-row">
        <span class="sp-from">${prev}%</span>
        <span class="sp-arr">to</span>
        <span class="sp-to ${isUp?'up':'down'}">${curr}%</span>
        <span class="sp-badge ${isUp?'move-up':'move-down'}">${sign}${move}%</span>
        <span class="sp-score">Score ${s.score}</span>
      </div>
    </div>
    <div class="sport-obs">
      <div class="sport-obs-label">${s.ai_summary ? 'What this means' : 'Context'}</div>
      <div class="sport-obs-text">${obs}</div>
    </div>
  </div>`
}

// ── SHARED ────────────────────────────────────────────────────────────────

function toggleRelated(el) {
  el.classList.toggle('open')
  el.nextElementSibling.classList.toggle('open')
}

function setIntelFilter(cat, el) {
  intelFilter=cat
  document.querySelectorAll('#intel-filters .sf').forEach(b=>b.classList.remove('on'))
  el.classList.add('on')
  renderIntel()
}
function setSportsFilter(f, el) {
  sportsFilter=f
  document.querySelectorAll('#sports-filters .sf').forEach(b=>b.classList.remove('on'))
  el.classList.add('on')
  renderSports()
}

function renderIntel() {
  const el=document.getElementById('intel-feed')
  let sigs=allSignals.filter(s=>INTEL_CATS.has(s.category))
  if (intelFilter!=='all') sigs=sigs.filter(s=>s.category===intelFilter)
  sigs.sort((a,b)=>{
    const au=a.state==='no_news'?1:0, bu=b.state==='no_news'?1:0
    return au!==bu ? bu-au : b.score-a.score
  })
  document.getElementById('tab-count-intel').textContent=sigs.length
  el.innerHTML=sigs.length
    ? sigs.map(renderIntelCard).join('')
    : `<div class="empty" style="grid-column:1/-1"><strong>No signals yet</strong><p>Nothing flagged in this category. The poller runs every 5 minutes.</p></div>`
}

function renderSports() {
  const el=document.getElementById('sports-feed')
  let sigs=allSignals.filter(s=>SPORTS_CATS.has(s.category))
  if (sportsFilter==='live')     sigs=sigs.filter(s=>s.sports_context==='large_ingame_move'||s.sports_context==='moderate_ingame_move')
  if (sportsFilter==='pregame')  sigs=sigs.filter(s=>s.sports_context==='pre_game_move')
  if (sportsFilter==='resolved') sigs=sigs.filter(s=>s.is_terminal)
  // resolved sink to bottom
  sigs.sort((a,b)=>{
    const ar=a.is_terminal?1:0, br=b.is_terminal?1:0
    return ar!==br ? ar-br : b.score-a.score
  })
  document.getElementById('tab-count-sports').textContent=sigs.length
  el.innerHTML=sigs.length
    ? sigs.map(renderSportsCard).join('')
    : `<div class="empty" style="grid-column:1/-1"><strong>No sports signals</strong><p>No unusual movements detected yet.</p></div>`
}

async function loadStats() {
  try {
    const d=await fetchR(`${API}/stats`)
    document.getElementById('stat-volume').textContent  = fmtVol(d.total_volume_monitored)
    document.getElementById('stat-markets').textContent = (d.market_count??0).toLocaleString()
    document.getElementById('stat-today').textContent   = d.today??0
    document.getElementById('stat-high').textContent    = d.high_confidence??0
  } catch(e) {}
}

async function loadFeed() {
  try {
    const d=await fetchR(`${API}/feed`)
    document.getElementById('error-box').style.display='none'
    allSignals=d.feed||[]
    if (allSignals.length>0)
      document.getElementById('live-label').textContent='Updated '+timeAgo(allSignals[0].detected_at)
    renderIntel()
    renderSports()
  } catch(e) {
    const b=document.getElementById('error-box')
    b.style.display='block'
    b.textContent=`Could not connect to API at ${API}. Check Railway is running.`
    document.getElementById('intel-feed').innerHTML=''
    document.getElementById('sports-feed').innerHTML=''
  }
}

async function loadAll() { await Promise.all([loadStats(), loadFeed()]) }
setInterval(loadAll, 5*60*1000)
loadAll()
</script>
