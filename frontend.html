<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaugeMarket — Live Feed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --white:#ffffff;--off:#f8f9fb;--ink:#0f1117;--ink2:#4a5162;--ink3:#9098a9;
    --border:#e4e7ef;--border2:#d0d5e0;
    --accent:#1a56db;--accent-light:#eff4ff;
    --green:#0e9f6e;--green-light:#f0fdf4;
    --amber:#c27803;--amber-light:#fffbeb;
    --purple:#7c3aed;--purple-light:#f5f3ff;
    --red:#e02424;
  }
  body{font-family:'Sora',sans-serif;background:var(--off);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh;}

  nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100;}
  .logo{font-size:17px;font-weight:600;}
  .logo span{color:var(--accent);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .live-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;}
  .live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .refresh-btn{font-size:13px;padding:7px 16px;border:1px solid var(--border2);border-radius:6px;background:var(--white);color:var(--ink2);cursor:pointer;font-family:'Sora',sans-serif;}
  .refresh-btn:hover{background:var(--off);}

  .main{max-width:1000px;margin:0 auto;padding:32px 40px;}

  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  .stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
  .stat-val{font-size:28px;font-weight:600;color:var(--ink);font-family:'JetBrains Mono',monospace;letter-spacing:-1px;}
  .stat-val span{color:var(--accent);}
  .stat-label{font-size:12px;color:var(--ink3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;}

  .feed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .feed-title{font-size:20px;font-weight:600;color:var(--ink);}
  .last-updated{font-size:12px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}

  .filter-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;color:var(--ink2);cursor:pointer;background:var(--white);font-family:'Sora',sans-serif;}
  .tab.on{background:var(--accent);color:var(--white);border-color:var(--accent);font-weight:500;}

  .cards{display:flex;flex-direction:column;gap:16px;}

  .empty{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:48px;text-align:center;}
  .empty-title{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px;}
  .empty-sub{font-size:14px;color:var(--ink3);line-height:1.7;max-width:400px;margin:0 auto;}
  .empty-timer{font-size:13px;color:var(--accent);margin-top:16px;font-family:'JetBrains Mono',monospace;}

  .loading{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:48px;text-align:center;color:var(--ink3);font-size:14px;}

  .card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .card.no_news{border-left:4px solid var(--purple);}
  .card.confirmed{border-left:4px solid var(--green);}
  .card.explained{border-left:4px solid var(--ink3);}
  .card.reversal{border-left:4px solid var(--red);}
  .card.uncertain{border-left:4px solid var(--amber);}
  .card.played_out{border-left:4px solid var(--green);}

  .card-top{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .card.no_news .card-top{background:var(--purple-light);}
  .card.confirmed .card-top{background:var(--green-light);}
  .card.explained .card-top{background:var(--off);}
  .card.reversal .card-top{background:#fff5f5;}
  .card.uncertain .card-top{background:var(--amber-light);}
  .card.played_out .card-top{background:var(--green-light);}

  .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .card.no_news .sdot{background:var(--purple);animation:pp 1.5s infinite;}
  .card.confirmed .sdot{background:var(--green);animation:pp 1.5s infinite;}
  .card.explained .sdot{background:var(--ink3);}
  .card.reversal .sdot{background:var(--red);animation:pp 1.5s infinite;}
  .card.uncertain .sdot{background:var(--amber);animation:pp 1.5s infinite;}
  .card.played_out .sdot{background:var(--green);}
  @keyframes pp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.5)}}

  .slabel{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .card.no_news .slabel{color:var(--purple);}
  .card.confirmed .slabel{color:var(--green);}
  .card.explained .slabel{color:var(--ink3);}
  .card.reversal .slabel{color:var(--red);}
  .card.uncertain .slabel{color:var(--amber);}
  .card.played_out .slabel{color:var(--green);}

  .cat-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;text-transform:uppercase;letter-spacing:0.04em;background:var(--off);color:var(--ink3);border:1px solid var(--border);}
  .score-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;font-family:'JetBrains Mono',monospace;margin-left:auto;}
  .score-extreme{background:#fef3c7;color:#92400e;}
  .score-high{background:#dbeafe;color:#1e40af;}
  .score-medium{background:var(--off);color:var(--ink3);}
  .stime{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}

  .card-body{padding:18px 20px;}
  .question{font-size:15px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:14px;}
  .platform-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;margin-left:8px;vertical-align:middle;}
  .poly{background:#dbeafe;color:#1e40af;}
  .kal{background:#d1fae5;color:#065f46;}

  .move-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .o-from{font-size:14px;color:var(--ink3);font-family:'JetBrains Mono',monospace;}
  .o-arr{color:var(--ink3);font-size:14px;}
  .o-to{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace;}
  .o-badge{font-size:12px;padding:3px 10px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:500;}
  .move-up{background:#ede9fe;color:#5b21b6;}
  .move-down{background:#fef3c7;color:#92400e;}
  .o-track{flex:1;height:5px;background:var(--off);border-radius:3px;overflow:hidden;}
  .o-fill{height:100%;border-radius:3px;}

  .meta-row{display:flex;gap:20px;flex-wrap:wrap;}
  .meta{font-size:13px;color:var(--ink3);}
  .meta strong{color:var(--ink);font-weight:500;}

  .news-section{padding:14px 20px;border-top:1px solid var(--border);}
  .ns-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}

  .vacuum{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--purple-light);border:1px solid #ddd6fe;border-radius:8px;}
  .vdot{width:7px;height:7px;background:var(--purple);border-radius:50%;margin-top:5px;flex-shrink:0;animation:pp 1.5s infinite;}
  .vtext{font-size:13px;color:#5b21b6;line-height:1.7;}

  .art{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
  .art-src{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#dbeafe;color:#1e40af;font-family:'JetBrains Mono',monospace;display:inline-block;margin-bottom:8px;}
  .art-hl{font-size:14px;font-weight:600;color:var(--ink);line-height:1.5;}

  .obs{padding:16px 20px;border-top:1px solid var(--border);background:var(--ink);}
  .obs-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .obs-text{font-size:14px;color:rgba(255,255,255,0.92);line-height:1.8;font-style:italic;}

  .error{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:20px;text-align:center;color:var(--red);font-size:14px;margin-bottom:20px;}

  .contracts-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .contract-item{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
  .contract-item.primary{background:var(--white);border-color:var(--border2);}
  .bet-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;}
  .related-contracts{display:flex;flex-direction:column;gap:8px;}
  .related-bet{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .rb-question{font-size:13px;color:var(--ink2);line-height:1.5;margin-bottom:8px;}
  .rb-meta{display:flex;align-items:center;gap:10px;}
  .rb-odds{font-size:13px;font-weight:600;color:var(--ink);font-family:'JetBrains Mono',monospace;}
  .rb-type{font-size:11px;color:var(--ink3);font-style:italic;}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--off);border:1px solid var(--border);border-radius:8px;}
  .total-left{font-size:13px;color:var(--ink3);}
  .conv-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;}
  .conv-badge.cross{background:#dbeafe;color:#1e40af;}
  .conv-badge.same{background:#f0fdf4;color:#065f46;}
</style>
</head>
<body>

<nav>
  <div class="logo">Gauge<span>Market</span></div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div><span id="live-status">Connecting...</span></div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</nav>

<div class="main">

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="stat-volume">—</div><div class="stat-label">Volume monitored</div></div>
    <div class="stat"><div class="stat-val" id="stat-markets">—</div><div class="stat-label">Markets watched</div></div>
    <div class="stat"><div class="stat-val" id="stat-today">—</div><div class="stat-label">Signals today</div></div>
    <div class="stat"><div class="stat-val" id="stat-high">—</div><div class="stat-label">High confidence</div></div>
  </div>

  <div class="feed-header">
    <div class="feed-title">Intelligence feed</div>
    <div class="last-updated" id="last-updated">—</div>
  </div>

  <div class="filter-tabs">
    <span class="tab on" onclick="setCategory('all', this)">All</span>
    <span class="tab" onclick="setCategory('political', this)">Political</span>
    <span class="tab" onclick="setCategory('macro', this)">Macro</span>
    <span class="tab" onclick="setCategory('geopolitical', this)">Geopolitical</span>
    <span class="tab" onclick="setCategory('sports', this)">Sports</span>
    <span class="tab" onclick="setCategory('esports', this)">Esports</span>
    <span class="tab" onclick="setCategory('crypto', this)">Crypto</span>
    <span class="tab" onclick="setCategory('other', this)">Other</span>
  </div>

  <div id="error-box" style="display:none"></div>
  <div class="cards" id="feed"></div>

</div>

<script>
  const API = 'https://web-production-bde4.up.railway.app'
  let currentCategory = 'all'

  function setCategory(cat, el) {
    currentCategory = cat
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'))
    el.classList.add('on')
    loadFeed()
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000
    if (diff < 60) return `${Math.floor(diff)}s ago`
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`
    return `${Math.floor(diff/86400)}d ago`
  }

  function signalLabel(s) {
    if (s.is_reversal) return 'Reversal · Contract moved opposite direction'
    if (s.state === 'no_news') return 'Inconsistent · No public news'
    if (s.state === 'confirmed') return 'News broke after position · Capital moved first'
    if (s.state === 'explained') return 'News already existed · May explain the move'
    if (s.state === 'uncertain') return 'News found · Timing unclear'
    return 'Signal detected'
  }

  function scoreClass(confidence) {
    if (confidence === 'extreme') return 'score-extreme'
    if (confidence === 'high') return 'score-high'
    return 'score-medium'
  }

  function moveColor(signal) {
    if (signal.is_reversal) return '#e02424'
    if (signal.state === 'no_news') return '#7c3aed'
    if (signal.direction === 'YES') return '#0e9f6e'
    return '#c27803'
  }

  function buildObservation(s) {
    const prev = Math.round(s.prev_odds * 100)
    const curr = Math.round(s.current_odds * 100)
    const move = Math.round(s.price_move * 100)
    const platform = s.platform
    const related = s.related_same_event + s.related_cross_event

    if (s.is_reversal) {
      const prevDir = s.reversal_from === 'YES' ? 'up' : 'down'
      const nowDir = s.direction === 'YES' ? 'up' : 'down'
      return `"Contract previously moved ${prevDir} ${s.reversal_prev_move} points, now reversing ${nowDir} ${move} points. Sharp reversals on the same contract can indicate informed positioning on both sides — or a correction of an earlier overreaction."`
    }
    if (s.state === 'no_news') {
      return `"${platform} contract moved from ${prev}% to ${curr}% — a ${move} point shift${related > 0 ? ` across ${related + 1} related contracts` : ''}. No public news found to explain this movement."`
    }
    if (s.state === 'confirmed') {
      return `"${platform} contract moved ${move} points before news confirmation. The move preceded the article by a meaningful window — capital appeared to price in the information early."`
    }
    return `"Signal detected and tracked through to resolution. ${platform} contract moved ${move} points. Full record logged."`
  }

  function renderRelatedContracts(contracts) {
    if (!contracts || contracts.length === 0) return ''
    return '<div class="related-contracts">' +
      contracts.map(c => {
        const curr = Math.round(c.odds * 100)
        const prev = c.prev_odds !== undefined ? Math.round(c.prev_odds * 100) : curr
        const moved = prev !== curr
        const moveAmt = curr - prev
        const moveStr = moved ? (moveAmt > 0 ? '+' + moveAmt : moveAmt) + '%' : ''
        const moveCol = moveAmt > 0 ? '#0e9f6e' : '#c27803'
        return '<div class="related-bet">' +
          '<div class="rb-question">"' + c.question + '"</div>' +
          '<div class="rb-meta">' +
            '<span class="platform-tag ' + (c.platform === 'Polymarket' ? 'poly' : 'kal') + '">' + c.platform + '</span>' +
            (curr > 0 ? '<span class="rb-odds">' + curr + '%</span>' : '') +
            (moved ? '<span class="rb-move" style="color:' + moveCol + ';font-size:12px;font-family:JetBrains Mono,monospace;">' + moveStr + '</span>' : '') +
            '<span class="rb-type">' + (
              c.type === 'causal' ? 'Causally linked' :
              c.type === 'cross_event' ? 'Related event' :
              c.type === 'cross_platform' ? 'Cross-platform' :
              'Same event'
            ) + '</span>' +
          '</div>' +
        '</div>'
      }).join('') +
    '</div>'
  }

  function renderCard(s) {
    const color = moveColor(s)
    const isUp = s.direction === 'YES'
    const moveBadgeClass = s.state === 'no_news' ? 'move-up' : (isUp ? 'move-up' : 'move-down')
    const moveSign = isUp ? '+' : '-'
    const moveAmt = Math.round(s.price_move * 100)
    const fillWidth = Math.round(s.current_odds * 100)
    const related = s.related_contracts || []
    const totalContracts = 1 + related.length
    const platforms = [...new Set([s.platform, ...related.map(r => r.platform)])]
    const crossPlatform = platforms.length > 1

    const newsHtml = s.news_vacuum
      ? '<div class="vacuum"><div class="vdot"></div><div class="vtext">No articles found matching this contract. Capital is leading the information record.</div></div>'
      : s.news_headline
        ? '<div class="art"><span class="art-src">' + (s.news_source || 'Yahoo Finance') + '</span><div class="art-hl"><a href="' + s.news_url + '" target="_blank" rel="noopener noreferrer" style="color:var(--ink);text-decoration:underline;text-decoration-color:var(--border2);">' + s.news_headline + '</a></div></div>'
        : ''

    const convergenceBadge = crossPlatform
      ? '<span class="conv-badge cross">Cross-platform</span>'
      : totalContracts > 2
        ? '<span class="conv-badge same">Multiple contracts</span>'
        : ''

    const cardClass = s.is_reversal ? 'reversal' : s.state
    return '<div class="card ' + cardClass + '">' +
      '<div class="card-top">' +
        '<div class="sdot"></div>' +
        '<span class="slabel">' + signalLabel(s) + '</span>' +
        '<span class="cat-badge">' + s.category + '</span>' +
        convergenceBadge +
        '<span class="score-badge ' + scoreClass(s.confidence) + '">Score ' + s.score + '</span>' +
        '<span class="stime">' + timeAgo(s.detected_at) + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="contracts-list">' +
          '<div class="contract-item primary">' +
            '<div class="bet-top">' +
              '<div class="question">' +
                (s.market_url
                  ? '<a href="' + s.market_url + '" target="_blank" rel="noopener noreferrer" style="color:var(--ink);text-decoration:underline;text-decoration-color:var(--border2);">"' + s.question + '"</a>'
                  : '"' + s.question + '"') +
              '</div>' +
              '<span class="platform-tag ' + (s.platform === 'Polymarket' ? 'poly' : 'kal') + '">' + s.platform + '</span>' +
            '</div>' +
            '<div class="move-row">' +
              '<span class="o-from">' + Math.round(s.prev_odds * 100) + '%</span>' +
              '<span class="o-arr">to</span>' +
              '<span class="o-to" style="color:' + color + '">' + Math.round(s.current_odds * 100) + '%</span>' +
              '<span class="o-badge ' + moveBadgeClass + '">' + moveSign + moveAmt + '%</span>' +
              '<div class="o-track"><div class="o-fill" style="width:' + fillWidth + '%;background:' + color + '"></div></div>' +
            '</div>' +
          '</div>' +
          (related.length > 0 ? renderRelatedContracts(related) : '') +
        '</div>' +
        (totalContracts > 1 ? (
          '<div class="total-row">' +
            '<span class="total-left">' + totalContracts + ' related contract' + (totalContracts > 1 ? 's' : '') + ' · ' + platforms.join(' + ') + (crossPlatform ? ' · Cross-platform' : '') + '</span>' +
          '</div>'
        ) : '') +
      '</div>' +
      (newsHtml ? '<div class="news-section"><div class="ns-label">News check</div>' + newsHtml + '</div>' : '') +
      '<div class="obs">' +
        '<div class="obs-label">Something\'s going on here</div>' +
        '<div class="obs-text">' + buildObservation(s) + '</div>' +
      '</div>' +
    '</div>'
  }


  function renderEmpty() {
    return `
      <div class="empty">
        <div class="empty-title">No signals yet</div>
        <div class="empty-sub">The poller is running and monitoring Polymarket and Kalshi every 5 minutes. Signals appear when unusual price movements are detected with no news to explain them.</div>
        <div class="empty-timer">Next poll in ~5 minutes</div>
      </div>
    `
  }

  function formatVolume(v) {
    if (!v) return '$0'
    if (v >= 1_000_000_000) return '$' + (v / 1_000_000_000).toFixed(1) + 'B'
    if (v >= 1_000_000) return '$' + (v / 1_000_000).toFixed(1) + 'M'
    if (v >= 1_000) return '$' + (v / 1_000).toFixed(0) + 'K'
    return '$' + v.toFixed(0)
  }

  async function loadStats() {
    try {
      const res = await fetch(`${API}/stats`)
      const data = await res.json()
      document.getElementById('stat-volume').textContent = formatVolume(data.total_volume_monitored)
      document.getElementById('stat-markets').textContent = (data.market_count ?? 0).toLocaleString()
      document.getElementById('stat-total').textContent = data.total ?? 0
      document.getElementById('stat-today').textContent = data.today ?? 0
      document.getElementById('stat-high').innerHTML = `<span>${data.high_confidence ?? 0}</span>`
      document.getElementById('live-status').textContent = 'Live'
    } catch(e) {
      document.getElementById('live-status').textContent = 'Offline'
    }
  }

  async function loadFeed() {
    const feed = document.getElementById('feed')
    feed.innerHTML = '<div class="loading">Loading signals...</div>'

    try {
      const url = currentCategory === 'all'
        ? `${API}/feed`
        : `${API}/feed?category=${currentCategory}`

      const res = await fetch(url)
      const data = await res.json()

      document.getElementById('error-box').style.display = 'none'

      if (!data.feed || data.feed.length === 0) {
        document.getElementById('last-updated').textContent = 'No signals yet'
        feed.innerHTML = renderEmpty()
        return
      }

      feed.innerHTML = data.feed.map(renderCard).join('')

      // Show real last signal time from most recent signal
      if (data.feed.length > 0) {
        const latest = data.feed[0].detected_at
        document.getElementById('last-updated').textContent =
          `Most recent signal ${timeAgo(latest)}`
      }
    } catch(e) {
      document.getElementById('error-box').style.display = 'block'
      document.getElementById('error-box').innerHTML =
        `<div class="error">Could not connect to API at ${API}. Check Railway is running.</div>`
      feed.innerHTML = ''
    }
  }

  async function loadAll() {
    await Promise.all([loadStats(), loadFeed()])
  }

  // Load on startup
  loadAll()

  // Auto refresh every 5 minutes
  setInterval(loadAll, 300000)
</script>

</body>
</html>
